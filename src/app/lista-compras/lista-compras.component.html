<div class="container">
    <h1>Lista de compras</h1>

    <form class="add-item-form" #frm="ngForm" (ngSubmit)="adicionarItem()">
        <input type="text" 
            id="item"
            name="item" 
            placeholder="Digite o nome do item" 
            [(ngModel)]="item"/>
        <button type="submit">Adicionar</button>
        <button type="button" (click)="limparLista()">Limpar Lista</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Item</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            @for (item of lista; track item.id) {
                <tr>
                    <td>{{ item.id }}</td>
                    <td>{{ item.nome }}</td>
                    <td><input type="checkbox" /></td>
                </tr>
            
            }
          
        </tbody>
    </table>
</div>
